apiVersion: apps/v1
kind: Deployment
metadata:
  name: govuk-route-library
  labels:
    app: govuk-route-library
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: govuk-route-library
  template:
    metadata:
      labels:
        app: govuk-route-library
        component: frontend
    spec:
      securityContext:
      containers:
      - name: frontend
        image: govuk-route-library:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_TELEMETRY_DISABLED
          value: "1"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        envFrom:
        - configMapRef:
            name: govuk-route-library-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
